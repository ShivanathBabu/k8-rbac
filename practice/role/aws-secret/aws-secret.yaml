apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
  spec:
    containers:
    - name: mysql
      image: shivanathbabu/mysql:v1
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-sa
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
spec:
  selector:
    project: roboshop
    environment: dev
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306